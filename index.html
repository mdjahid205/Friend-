<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমাদের বন্ধুত্বের গল্প</title>
    <style>
        /* CSS ডিজাইন */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #444;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff4081;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4081;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            font-size: 16px;
        }

        .heart {
            color: #ff4081;
            font-size: 20px;
        }

        .footer {
            margin-top: 20px;
            font-weight: bold;
            color: #7b1fa2;
        }
    </style>
</head>
<body>

    <div class="card">
        
        
        <h1>বন্ধুত্বের চিরন্তন বন্ধন ❤️</h1>
        
        <p>
            "বন্ধু মানে এক টুকরো রোদ, বন্ধু মানে নির্ভরতা। তোদের সাথে কাটানো প্রতিটা মুহূর্ত আমার জীবনের শ্রেষ্ঠ স্মৃতি। তোরা আছিস বলেই পৃথিবীটা এতো সুন্দর।"
        </p>

        <div class="footer">
            সব সময় পাশে থাকিস! 🤝
        </div>
    </div>

</body>
</html>
